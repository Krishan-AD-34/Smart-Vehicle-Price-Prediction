<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Smart Vehicle Price Predictor
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <div class="main-container">

        <!-- LEFT PANEL -->
        <div class="left-panel">

            <div class="overlay"></div>

            <div class="hero-content">

                <h1>
                    🚘 Smart Vehicle Price Predictor
                </h1>

                <p>
                    AI-powered resale value prediction system
                    trained on Indian used car market data.
                </p>

                <div class="stats">

                    <div class="stat-card">

                        <h2>87.5%</h2>

                        <span>Model Accuracy</span>

                    </div>

                    <div class="stat-card">

                        <h2>XGBoost</h2>

                        <span>ML Algorithm</span>

                    </div>

                </div>

            </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">

            <div class="form-container">

                <h2>
                    Vehicle Information
                </h2>

                <form id="predictForm">

                    <div class="grid">

                        <!-- BRAND -->
                        <div class="input-group">

                            <label>
                                Brand
                            </label>

                            <select id="brand" required>

                                <option value="">
                                    Select Brand
                                </option>

                                {% for brand in brands %}

                                <option value="{{ brand }}">
                                    {{ brand }}
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <!-- MODEL -->
                        <div class="input-group">

                            <label>
                                Model
                            </label>

                            <select id="car_name" required>

                                <option value="">
                                    Select Model
                                </option>

                            </select>

                        </div>

                        <!-- VEHICLE AGE -->
                        <div class="input-group">

                            <label>
                                Vehicle Age
                            </label>

                            <input
                                type="number"
                                id="vehicle_age"
                                placeholder="Years"
                                required
                            >

                        </div>

                        <!-- KM DRIVEN -->
                        <div class="input-group">

                            <label>
                                KM Driven
                            </label>

                            <input
                                type="number"
                                id="km_driven"
                                placeholder="e.g. 45000"
                                required
                            >

                        </div>

                        <!-- SELLER TYPE -->
                        <div class="input-group">

                            <label>
                                Seller Type
                            </label>

                            <select
                                id="seller_type"
                                required
                            >

                                <option value="Dealer">
                                    Dealer
                                </option>

                                <option value="Individual">
                                    Individual
                                </option>

                                <option value="Trustmark Dealer">
                                    Trustmark Dealer
                                </option>

                            </select>

                        </div>

                        <!-- FUEL -->
                        <div class="input-group">

                            <label>
                                Fuel Type
                            </label>

                            <select
                                id="fuel_type"
                                required
                            >

                                <option value="Petrol">
                                    Petrol
                                </option>

                                <option value="Diesel">
                                    Diesel
                                </option>

                                <option value="CNG">
                                    CNG
                                </option>

                                <option value="LPG">
                                    LPG
                                </option>

                            </select>

                        </div>

                        <!-- TRANSMISSION -->
                        <div class="input-group">

                            <label>
                                Transmission
                            </label>

                            <select
                                id="transmission_type"
                                required
                            >

                                <option value="Manual">
                                    Manual
                                </option>

                                <option value="Automatic">
                                    Automatic
                                </option>

                            </select>

                        </div>

                        <!-- MILEAGE -->
                        <div class="input-group">

                            <label>
                                Mileage (km/l)
                            </label>

                            <input
                                type="number"
                                step="0.1"
                                id="mileage"
                                placeholder="Auto Filled"
                                readonly
                                required
                            >

                        </div>

                        <!-- ENGINE -->
                        <div class="input-group">

                            <label>
                                Engine (CC)
                            </label>

                            <input
                                type="number"
                                id="engine"
                                placeholder="Auto Filled"
                                readonly
                                required
                            >

                        </div>

                        <!-- POWER -->
                        <div class="input-group">

                            <label>
                                Max Power
                            </label>

                            <input
                                type="number"
                                step="0.1"
                                id="max_power"
                                placeholder="Auto Filled"
                                readonly
                                required
                            >

                        </div>

                        <!-- SEATS -->
                        <div class="input-group">

                            <label>
                                Seats
                            </label>

                            <input
                                type="number"
                                id="seats"
                                placeholder="Auto Filled"
                                readonly
                                required
                            >

                        </div>

                    </div>

                    <!-- BUTTON -->
                    <button type="submit">

                        Predict Vehicle Price

                    </button>

                </form>

                <!-- RESULT -->
                <div class="result-card">

                    <h3>
                        Estimated Price
                    </h3>

                    <div id="result">

                        ₹ ---

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script
        src="{{ url_for('static', filename='script.js') }}"
    ></script>

</body>

</html>
